version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: examguard_postgres
    environment:
      POSTGRES_USER: examguard
      POSTGRES_PASSWORD: examguard_secret
      POSTGRES_DB: examguard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: examguard_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examguard_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://examguard:examguard_secret@postgres:5432/examguard_db
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: "http://localhost:3000"
      SECRET_KEY: "examguard-demo-secret-2026"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

  reasoning_agent:
    build:
      context: ./reasoning_agent
      dockerfile: Dockerfile
    container_name: examguard_reasoning
    environment:
      REDIS_URL: redis://redis:6379
      LLM_PROVIDER: "${LLM_PROVIDER:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      INTEGRITY_THRESHOLD: "50"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  action_agent:
    build:
      context: ./action_agent
      dockerfile: Dockerfile
    container_name: examguard_action
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:8000
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      REPORTS_DIR: /app/reports
      INSTITUTION_NAME: "CGC College of Engineering"
    depends_on:
      - backend
      - redis
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: examguard_dashboard
    environment:
      VITE_API_URL: "http://localhost:8000"
      VITE_WS_URL: "ws://localhost:8000"
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── DEMO-ONLY: runs the simulation script then exits ──────────
  demo_simulator:
    build:
      context: ./scripts
      dockerfile: Dockerfile.simulator
    container_name: examguard_demo
    environment:
      REDIS_URL: redis://redis:6379
      DEMO_SESSION_ID: demo_session_001
    depends_on:
      - reasoning_agent
      - action_agent
    profiles:
      - demo   # only runs with: docker-compose --profile demo up

volumes:
  postgres_data:
